services:
  - type: web
    name: daily-react
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: daily-react-db
          property: connectionString

databases:
  - name: daily-react-db
    databaseName: daily_react
    plan: free
