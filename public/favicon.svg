<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5c8a"/>
      <stop offset="100%" stop-color="#e91e8c"/>
    </linearGradient>
  </defs>
  <!-- soft rounded square bg (reads well on light + dark browser chrome) -->
  <rect width="64" height="64" rx="14" fill="#1a0a28"/>
  <!-- ears -->
  <ellipse cx="18" cy="18" rx="9" ry="11" fill="#fffefc" transform="rotate(-18 18 18)"/>
  <ellipse cx="46" cy="18" rx="9" ry="11" fill="#fffefc" transform="rotate(18 46 18)"/>
  <!-- face -->
  <ellipse cx="32" cy="30" rx="22" ry="18" fill="#fffefc"/>
  <!-- bow (left) -->
  <ellipse cx="12" cy="24" rx="8" ry="5" fill="url(#bow)" transform="rotate(-28 12 24)"/>
  <ellipse cx="6" cy="22" rx="4" ry="4" fill="#ff8fb8"/>
  <circle cx="10" cy="25" r="3" fill="#ffb3d0"/>
  <!-- eyes -->
  <ellipse cx="24" cy="28" rx="2.5" ry="4" fill="#1a1020"/>
  <ellipse cx="40" cy="28" rx="2.5" ry="4" fill="#1a1020"/>
  <!-- nose -->
  <ellipse cx="32" cy="34" rx="2" ry="1.4" fill="#ffd54f"/>
</svg>
